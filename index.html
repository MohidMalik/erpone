<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ERPOne - Enterprise Suite</title>
    
    <!-- PWA Manifest & App Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="https://img.icons8.com/color/192/company.png" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/company.png" />
    
    <!-- Apple Mobile Web App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ERPOne" />
    <meta name="theme-color" content="#10b981" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('ERPOne Service Worker registered successfully:', reg.scope))
            .catch(err => console.error('ERPOne Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
